<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Chickens - login</title>
    <script defer src="/javascript/login.js"></script>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="coisas-login">
        <div class="pt-esquerda">
            <div class="logotipo">M Chickens</div>
            <a href="index.html" class="link-voltar">Voltar para o site ></a>
            <div class="coisas-painel">
                <h1 class="titulo">O Sabor Que Faz a Diferença.</h1>
            </div>
            <div class="m-decorativo">M</div>
        </div>

        <div class="pt-direita">
            <h2>Logar uma conta</h2>
            <p class="login1">Não tem uma conta? <a href="cadastrar.html" class="login2">Criar conta</a></p>

            <br>

                <div class="nome">
                    <input type="text" id="usuario" class="inputs" placeholder="Usuário" required>
                    <input type="password" id="password" class="inputs" placeholder="Senha" required>
                </div>
                
                <input type="email" class="inputs" placeholder="E-mail" id="email" required>

                <div class="checkbox">
                    <input placeholder="." class="cb" type="checkbox" id="termos" required>
                    <h4 >Eu concordo com os <a href="#">Termos & Condições</a></h4>
                </div>

                <button onclick="logar()" type="submit" class="botaocriar">Logar conta</button>

            <p class="registarga">Ou logue com</p> 

            <div class="logingoogle">
                <button class="botao-g">
                     <img src="../img/search.png" alt=""> <span>Google</span>
                </button>
                <button class="botao-f">
                     <img src="../img/facebook.png" alt=""> Facebook 
                </button>
            </div>
        </div>
    </div>

</body>
</html>
